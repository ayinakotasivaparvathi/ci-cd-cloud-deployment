name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            sudo docker stop ci-cd-app || true
            sudo docker rm ci-cd-app || true
            cd ~/app || git clone https://github.com/ayinakotasivaparvathi/ci-cd-cloud-deployment app
            cd ~/app
            git pull origin main
            sudo docker build -t ci-cd-app .
            sudo docker run -d -p 80:3000 --name ci-cd-app ci-cd-app